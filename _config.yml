# ===== NOOBS — Configuration =====
title: NOOBS
description: "Tutoriels IT par Franck Hugonnier — VMware, Windows Server, PowerShell"
url: "https://fhugonnier.github.io"
baseurl: ""
author:
  name: Franck Hugonnier
lang: fr

# Permaliens
permalink: /:year/:month/:day/:title/

# Pagination
paginate: 9
paginate_path: "/page/:num/"

# Build
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter_opts:
    default_lang: plaintext
    block:
      line_numbers: false

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap

# Exclure
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor
